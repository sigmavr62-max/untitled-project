<!DOCTYPE html>
<html>
<head>
    <link href="https://fonts.googleapis.com/css2?family=Londrina+Solid:wght@300;400;900&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: white; font-family: 'Londrina Solid', sans-serif; height: 100vh; margin: 0; display: flex; flex-direction: column; overflow: hidden; }
        #chat { flex: 1; overflow-y: auto; padding: 30px; display: flex; flex-direction: column; gap: 15px; background: radial-gradient(circle at 50% 50%, #080815 0%, #000 100%); }
        .msg { padding: 18px 25px; border-radius: 25px; max-width: 75%; font-size: 1.5rem; line-height: 1.2; }
        .nova { background: #ff453a; align-self: flex-start; border-bottom-left-radius: 2px; box-shadow: 0 5px 15px rgba(255, 69, 58, 0.2); }
        .user { background: #111; align-self: flex-end; border-bottom-right-radius: 2px; border: 1px solid #333; }
        .header { padding: 20px; border-bottom: 1px solid #111; display: flex; justify-content: space-between; align-items: center; }
        #thought-log { font-size: 0.7rem; color: #ff453a; letter-spacing: 2px; display: none; }
        .input-area { padding: 30px; background: #000; border-top: 1px solid #111; }
        input { width: 100%; padding: 20px; border-radius: 50px; border: 1px solid #222; background: #050505; color: white; font-size: 1.4rem; outline: none; box-sizing: border-box; }
    </style>
</head>
<body>
    <div class="header">
        <span style="font-size: 2.2rem;">NOVA <small style="color:#333">CORE_V6</small></span>
        <div id="thought-log">SCANNING DICTIONARY...</div>
    </div>
    <div id="chat"><div class="msg nova">Neural dictionary loaded. I am listening.</div></div>
    <div class="input-area"><input type="text" id="userInput" placeholder="Speak to Nova..." autocomplete="off"></div>

    <script>
        const chat = document.getElementById('chat');
        const input = document.getElementById('userInput');
        const log = document.getElementById('thought-log');

        // --- THE DICTIONARY (MEANINGS & CONCEPTS) ---
        // Instead of keywords, we define "Intent Clusters"
        const dictionary = {
            "IDENTITY": {
                words: ["who", "what", "identity", "name", "nova", "model", "ai", "bot", "yourself"],
                meaning: "The concept of self-awareness and origin.",
                response: "My name is nova, i am a very dumb and unknown model."
            },
            "GREETING": {
                words: ["hi", "hello", "hey", "greetings", "sup", "yo", "morning"],
                meaning: "A social initiation or acknowledgment.",
                response: "Hello! My dictionary recognized your greeting."
            },
            "MATH": {
                words: ["plus", "minus", "times", "divided", "sum", "total", "calculate", "math"],
                meaning: "Numerical logic and calculation.",
                response: "I've detected a mathematical request. I'm processing the logic now..."
            }
        };

        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && input.value.trim() !== "") {
                const rawMessage = input.value.trim();
                input.value = "";
                novaThinkingProcess(rawMessage);
            }
        });

        // THE FUNCTION YOU REQUESTED
        function novaThinkingProcess(message) {
            // 1. Copy and Display User Message
            chat.innerHTML += `<div class="msg user">${message}</div>`;
            chat.scrollTop = chat.scrollHeight;
            
            log.style.display = "block";

            // 2. Scan the message and break it into individual words (The "Reader")
            const wordsInMessage = message.toLowerCase().replace(/[^\w\s]/g, "").split(/\s+/);

            // Determine if we need to "Think" (Long messages)
            const delay = wordsInMessage.length > 1 ? 2500 : 400;

            setTimeout(() => {
                let detectedConcept = null;
                let highestConfidence = 0;

                // 3. Scan through the dictionary to find the meanings (The "Thinker")
                for (let concept in dictionary) {
                    let matchesFound = 0;
                    
                    // Cross-reference every word in the user's message with the dictionary
                    wordsInMessage.forEach(word => {
                        if (dictionary[concept].words.includes(word)) {
                            matchesFound++;
                        }
                    });

                    // If we find more matches for this concept, it becomes the "Answer"
                    if (matchesFound > highestConfidence) {
                        highestConfidence = matchesFound;
                        detectedConcept = dictionary[concept];
                    }
                }

                // 4. Final Logic Gate
                let finalResponse = "Sorry, i dont know this yet!";
                
                if (highestConfidence > 0) {
                    // Check for the "Just saying Nova" case specifically
                    if (message.toLowerCase() === "nova") {
                        finalResponse = "Hello!";
                    } else {
                        finalResponse = detectedConcept.response;
                    }
                }

                log.style.display = "none";
                chat.innerHTML += `<div class="msg nova">${finalResponse}</div>`;
                chat.scrollTop = chat.scrollHeight;
            }, delay);
        }
    </script>
</body>
</html>
