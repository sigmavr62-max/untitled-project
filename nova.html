<!DOCTYPE html>
<html>
<head>
    <link href="https://fonts.googleapis.com/css2?family=Londrina+Solid:wght@300;400;900&display=swap" rel="stylesheet">
    <script type="module">
        import { pipeline } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.6.0';
        window.pipeline = pipeline;
    </script>
    <style>
        body { background: #000; color: white; font-family: 'Londrina Solid', sans-serif; display: flex; flex-direction: column; height: 100vh; margin: 0; overflow: hidden; }
        #chat { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 15px; background: radial-gradient(circle at 50% 50%, #050510 0%, #000 100%); }
        .msg { padding: 18px 25px; border-radius: 28px; max-width: 80%; font-size: 1.4rem; line-height: 1.3; animation: pop 0.4s ease; }
        .nova { background: #ff453a; align-self: flex-start; border-bottom-left-radius: 2px; }
        .user { background: #111; align-self: flex-end; border-bottom-right-radius: 2px; border: 1px solid #333; }
        .header { padding: 20px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
        #loading-text { color: #ff453a; font-size: 0.8rem; letter-spacing: 2px; display: none; }
        .input-area { padding: 30px; background: #000; border-top: 1px solid #222; }
        input { width: 100%; padding: 20px; border-radius: 50px; border: 1px solid #222; font-size: 1.3rem; background: #080808; color: white; outline: none; box-sizing: border-box; }
        @keyframes pop { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>
    <div class="header">
        <span style="font-size: 2rem;">NOVA <small style="color:#555">LLM_ENGINE</small></span>
        <div id="loading-text">LLM IS THINKING...</div>
    </div>

    <div id="chat">
        <div class="msg nova">Nova LLM Initialized. My "Dumb and Unknown" model is ready for input.</div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Interact with Nova's mind..." autocomplete="off">
    </div>

    <script type="module">
        const input = document.getElementById('userInput');
        const chat = document.getElementById('chat');
        const loader = document.getElementById('loading-text');

        // Pre-defined Intent vectors for the "Dumb Model" persona
        const identityIntents = ["who are you", "what model are you", "what ai are you", "tell me about yourself"];
        
        input.addEventListener('keypress', async (e) => {
            if (e.key === 'Enter' && input.value.trim() !== "") {
                const query = input.value.trim();
                input.value = "";
                await processLLM(query);
            }
        });

        async function processLLM(query) {
            chat.innerHTML += `<div class="msg user">${query}</div>`;
            chat.scrollTop = chat.scrollHeight;

            const isShort = query.split(" ").length < 2;
            const waitTime = isShort ? 400 : (Math.random() * 3000 + 2000);

            if(!isShort) loader.style.display = "block";

            setTimeout(() => {
                loader.style.display = "none";
                let response = "Sorry, i dont know this yet!";

                // LLM Intent Logic
                const lowerQuery = query.toLowerCase();
                
                // Check for Identity Intent
                const isAskingIdentity = identityIntents.some(intent => lowerQuery.includes(intent));

                if (isAskingIdentity) {
                    response = "My name is nova, i am a very dumb and unknown model.";
                } else if (lowerQuery.includes("hi") || lowerQuery.includes("hello")) {
                    response = "Greetings. I'm running locally on your hardware.";
                }

                chat.innerHTML += `<div class="msg nova">${response}</div>`;
                chat.scrollTop = chat.scrollHeight;
            }, waitTime);
        }
    </script>
</body>
</html>
