<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova</title>
    <style>
        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: #343541; /* Dark Gray base */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #ececf1;
        }

        #app { display: flex; flex-direction: column; height: 100vh; }

        /* Chat Window with Row-based structure */
        #chat-window {
            flex: 1; overflow-y: auto; display: flex; flex-direction: column;
        }

        .message-row {
            width: 100%; padding: 24px 0;
            display: flex; justify-content: center;
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }

        /* Alternating Row Colors like your screenshot */
        .user-row { background-color: #343541; }
        .nova-row { background-color: #444654; }

        .content-wrapper {
            max-width: 800px; width: 90%;
            display: flex; align-items: flex-start; gap: 20px;
        }

        /* Avatars */
        .avatar {
            width: 32px; height: 32px; border-radius: 2px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 600; font-size: 14px; color: white; flex-shrink: 0;
        }
        .user-avatar { background: #5436da; } /* Purple/Blue */
        .nova-avatar { background: #10a37f; } /* Green */

        .text-box { font-size: 16px; line-height: 1.6; word-wrap: break-word; }

        /* Modern Centered Input */
        .input-area {
            padding: 20px 0 40px 0;
            background: linear-gradient(180deg, rgba(52,53,65,0), #343541 50%);
            display: flex; justify-content: center;
        }

        .input-container {
            max-width: 800px; width: 90%; position: relative;
            background: #40414f; border-radius: 6px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
        }

        #userInput {
            width: 100%; background: transparent; border: none;
            color: white; padding: 14px 45px 14px 16px;
            font-size: 16px; outline: none; resize: none;
            font-family: inherit; min-height: 52px;
        }

        .send-btn {
            position: absolute; right: 12px; bottom: 12px;
            background: transparent; border: none; cursor: pointer;
            color: #acacbe; transition: color 0.2s;
        }
        .send-btn:hover { color: white; }
    </style>
</head>
<body>

<div id="app">
    <div id="chat-window">
        <div class="message-row nova-row">
            <div class="content-wrapper">
                <div class="avatar nova-avatar">N</div>
                <div class="text-box">Nova systems active. I have moved into the new UI layout. How can we proceed?</div>
            </div>
        </div>
    </div>

    <div class="input-area">
        <div class="input-container">
            <textarea id="userInput" placeholder="Send a message..." rows="1"></textarea>
            <button class="send-btn" id="sendBtn">
                <svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" height="18" width="18"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>
    </div>
</div>

<script>
    const chat = document.getElementById('chat-window');
    const input = document.getElementById('userInput');
    const btn = document.getElementById('sendBtn');

    function createRow(text, isUser) {
        const row = document.createElement('div');
        row.className = `message-row ${isUser ? 'user-row' : 'nova-row'}`;
        row.innerHTML = `
            <div class="content-wrapper">
                <div class="avatar ${isUser ? 'user-avatar' : 'nova-avatar'}">${isUser ? 'U' : 'N'}</div>
                <div class="text-box">${text}</div>
            </div>
        `;
        chat.appendChild(row);
        chat.scrollTop = chat.scrollHeight;
    }

    function sendMessage() {
        const msg = input.value.trim();
        if (msg) {
            createRow(msg, true);
            input.value = '';
            
            // Simulation of "thinking"
            setTimeout(() => {
                createRow("Awaiting your next instruction for NovaV0.5.", false);
            }, 600);
        }
    }

    btn.addEventListener('click', sendMessage);
    input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });
</script>

</body>
</html>
