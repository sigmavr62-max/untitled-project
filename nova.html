<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nova Neural Core</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        :root { --bg: #08080a; --accent: #007aff; --panel: #141417; --text: #e1e1e6; --font: 'JetBrains Mono', monospace; }
        body { background: var(--bg); color: var(--text); font-family: var(--font); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        #sidebar { width: 380px; background: var(--panel); border-right: 1px solid #28282b; display: flex; flex-direction: column; padding: 20px; box-shadow: 10px 0 30px rgba(0,0,0,0.5); }
        .memory-card { background: #1c1c21; border-radius: 8px; padding: 12px; margin-bottom: 15px; border: 1px solid #333; font-size: 0.75rem; animation: slideIn 0.3s ease; }
        .memory-card img { width: 100%; border-radius: 4px; margin-bottom: 8px; opacity: 0.8; }
        
        #viewport { flex: 1; display: flex; flex-direction: column; background: radial-gradient(circle at top right, #101014, #08080a); }
        #chat-flow { flex: 1; padding: 40px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; scroll-behavior: smooth; }
        .bubble { padding: 14px 20px; border-radius: 12px; max-width: 80%; line-height: 1.6; font-size: 0.95rem; }
        .nova { background: rgba(255,255,255,0.05); align-self: flex-start; border: 1px solid #333; }
        .user { background: var(--accent); align-self: flex-end; color: white; box-shadow: 0 4px 15px rgba(0,122,255,0.3); }

        .input-zone { padding: 30px; background: rgba(0,0,0,0.4); border-top: 1px solid #28282b; display: flex; gap: 15px; backdrop-filter: blur(10px); }
        #userInput { flex: 1; background: #000; border: 1px solid #333; border-radius: 8px; padding: 15px; color: #00ff41; outline: none; font-family: var(--font); }
        .btn { background: #222; border: 1px solid #444; color: white; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-family: var(--font); font-size: 0.8rem; }
        .btn:hover { background: var(--accent); border-color: var(--accent); }

        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body>

<div id="sidebar">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h3 style="margin:0; font-size:1rem; color:var(--accent);">NEURAL_STORAGE</h3>
        <span id="mem-count" style="font-size:0.7rem; opacity:0.5;">0 ASSETS</span>
    </div>
    <div id="memory-vessel" style="overflow-y:auto; flex:1;"></div>
</div>

<div id="viewport">
    <div id="chat-flow">
        <div class="bubble nova">Systems check... Memory optimized. Ready for input.</div>
    </div>
    <div class="input-zone">
        <input type="file" id="fileIn" hidden accept="image/*">
        <button class="btn" onclick="document.getElementById('fileIn').click()">SRC_LOAD</button>
        <input type="text" id="userInput" placeholder="root@nova:~# type message...">
    </div>
</div>

<script>
    const vessel = document.getElementById('memory-vessel');
    const chat = document.getElementById('chat-flow');
    const fileIn = document.getElementById('fileIn');
    const input = document.getElementById('userInput');

    let db;
    let pendingImgData = null;

    // --- INDEXED_DB INIT ---
    const req = indexedDB.open("NovaNeural", 2);
    req.onupgradeneeded = (e) => {
        db = e.target.result;
        if(!db.objectStoreNames.contains("vision")) {
            db.createObjectStore("vision", { keyPath: "hash" });
        }
    };
    req.onsuccess = (e) => { db = e.target.result; syncMemory(); };

    // --- DUPLICATE PREVENTION & FINGERPRINTING ---
    async function getHash(dataUrl) {
        const msgUint8 = new TextEncoder().encode(dataUrl);
        const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
        return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    fileIn.onchange = async (e) => {
        const file = e.target.files[0];
        if(!file) return;

        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = async (ev) => {
            const dataUrl = ev.target.result;
            const hash = await getHash(dataUrl);
            
            // Check if exists
            const tx = db.transaction("vision", "readonly");
            const store = tx.objectStore("vision");
            const check = store.get(hash);

            check.onsuccess = () => {
                if(check.result) {
                    addMsg('nova', `IDENTIFIED: [${file.name}]. This is a known asset: **${check.result.meaning}**`);
                    pendingImgData = null;
                } else {
                    pendingImgData = { data: dataUrl, hash: hash, name: file.name };
                    addMsg('nova', `NEW_DATA_DETECTED. Requesting classification: What does this image represent?`);
                }
            };
        };
    };

    input.onkeypress = (e) => {
        if(e.key === 'Enter' && input.value.trim()) {
            const val = input.value;
            input.value = "";
            addMsg('user', val);
            
            if(pendingImgData) {
                saveMemory(pendingImgData, val);
            } else {
                addMsg('nova', `EXECUTING: "${val}"... (Local response logic here)`);
            }
        }
    };

    async function saveMemory(imgObj, meaning) {
        addMsg('nova', `PROCESSED. Writing to neural sector...`);
        const ocr = await Tesseract.recognize(imgObj.data, 'eng');
        
        const entry = {
            hash: imgObj.hash,
            image: imgObj.data,
            meaning: meaning,
            ocr: ocr.data.text.trim(),
            date: new Date().toLocaleString()
        };

        const tx = db.transaction("vision", "readwrite");
        tx.objectStore("vision").put(entry);
        tx.oncomplete = () => {
            pendingImgData = null;
            syncMemory();
        };
    }

    function syncMemory() {
        vessel.innerHTML = "";
        const tx = db.transaction("vision", "readonly");
        tx.objectStore("vision").openCursor().onsuccess = (e) => {
            const cursor = e.target.result;
            if(cursor) {
                const card = document.createElement('div');
                card.className = "memory-card";
                card.innerHTML = `<img src="${cursor.value.image}"><b>TYPE:</b> ${cursor.value.meaning}<br><b>OCR:</b> ${cursor.value.ocr.substring(0,20)}...`;
                vessel.appendChild(card);
                cursor.continue();
            }
            document.getElementById('mem-count').innerText = `${vessel.children.length} ASSETS`;
        };
    }

    function addMsg(who, text) {
        const b = document.createElement('div');
        b.className = `bubble ${who}`;
        b.innerHTML = text;
        chat.appendChild(b);
        chat.scrollTop = chat.scrollHeight;
    }
</script>
</body>
</html>
