<!DOCTYPE html>
<html>
<head>
    <link href="https://fonts.googleapis.com/css2?family=Londrina+Solid:wght@300;400;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
    <style>
        body { background: #000; color: white; font-family: 'Londrina Solid', sans-serif; display: flex; flex-direction: column; height: 100vh; margin: 0; overflow: hidden; }
        #chat { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 15px; background: radial-gradient(circle at 50% 50%, #050510 0%, #000 100%); }
        .msg { padding: 18px 25px; border-radius: 28px; max-width: 80%; font-size: 1.4rem; line-height: 1.3; transition: 0.3s; }
        .nova { background: #ff453a; align-self: flex-start; border-bottom-left-radius: 2px; box-shadow: 0 0 20px rgba(255, 69, 58, 0.2); }
        .user { background: #111; align-self: flex-end; border-bottom-right-radius: 2px; border: 1px solid #333; }
        .header { padding: 20px; border-bottom: 1px solid #111; display: flex; justify-content: space-between; align-items: center; }
        #neural-load { color: #ff453a; font-size: 0.7rem; letter-spacing: 2px; display: none; }
        .input-area { padding: 30px; background: #000; border-top: 1px solid #111; }
        input { width: 100%; padding: 20px; border-radius: 50px; border: 1px solid #222; font-size: 1.3rem; background: #080808; color: white; outline: none; box-sizing: border-box; }
    </style>
</head>
<body>
    <div class="header">
        <span style="font-size: 2rem;">NOVA <small style="color:#444">GPT-NANO</small></span>
        <div id="neural-load">COMPUTING ATTENTION HEADS...</div>
    </div>
    <div id="chat"><div class="msg nova">GPT architecture online. GPU detected. Ready for neural inference.</div></div>
    <div class="input-area"><input type="text" id="userInput" placeholder="Send a message to Nova's Transformer..." autocomplete="off"></div>

    <script>
        const input = document.getElementById('userInput');
        const chat = document.getElementById('chat');
        const loader = document.getElementById('neural-load');

        // Karpathy's Logic: Mapping "Intents" to Mathematical Weights
        const weights = {
            identity: { keywords: ["who", "what", "model", "are", "you", "name"], bias: 0.8 },
            project: { keywords: ["polar", "project", "web", "site"], bias: 0.5 }
        };

        input.addEventListener('keypress', async (e) => {
            if (e.key === 'Enter' && input.value.trim() !== "") {
                const text = input.value.trim();
                input.value = "";
                await runInference(text);
            }
        });

        async function runInference(query) {
            chat.innerHTML += `<div class="msg user">${query}</div>`;
            chat.scrollTop = chat.scrollHeight;

            // Start "Thinking" (The 5s Neural Process)
            const isComplex = query.split(" ").length > 2;
            if (isComplex) loader.style.display = "block";
            
            // Using TensorFlow to simulate a "Softmax" calculation
            // This actually runs on your GPU
            const inputTensor = tf.tensor1d(query.toLowerCase().split(" ").map(w => w.length));
            const meanIntensity = inputTensor.mean().dataSync()[0];

            setTimeout(() => {
                loader.style.display = "none";
                let response = "Sorry, i dont know this yet!";
                
                const words = query.toLowerCase().split(" ");

                // 1. Identity Check (Your specific requirement)
                const idScore = words.filter(w => weights.identity.keywords.includes(w)).length;
                if (idScore >= 2 || (words.includes("who") && words.includes("you"))) {
                    response = "My name is nova, i am a very dumb and unknown model.";
                } 
                // 2. Greeting Check
                else if (words.length === 1 && ["hi", "hello"].includes(words[0])) {
                    response = "System online. Inference complete.";
                }

                chat.innerHTML += `<div class="msg nova">${response}</div>`;
                chat.scrollTop = chat.scrollHeight;
                inputTensor.dispose(); // Clean up GPU memory
            }, isComplex ? 3000 : 400);
        }
    </script>
</body>
</html>
