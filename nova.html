<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Neural Core</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>
    <style>
        :root { 
            --bg: #050505; --panel: #121214; --accent: #007aff; 
            --text: #ffffff; --text-dim: #8e8e93; --user: #1c1c1e;
        }
        body { 
            background: var(--bg); color: var(--text); 
            font-family: -apple-system, "SF Pro Display", "Inter", sans-serif; 
            margin: 0; display: flex; height: 100vh; overflow: hidden; 
        }

        /* Sidebar for Memory Visualization */
        #sidebar { 
            width: 300px; background: var(--panel); border-right: 1px solid #2c2c2e; 
            display: flex; flex-direction: column; padding: 20px; 
        }
        .mem-node { 
            font-size: 0.8rem; padding: 10px; border-bottom: 1px solid #2c2c2e; 
            color: var(--text-dim); transition: 0.3s;
        }
        .mem-node:hover { color: var(--accent); background: #1a1a1c; }

        /* Main Chat */
        #main { flex: 1; display: flex; flex-direction: column; position: relative; }
        header { padding: 20px 40px; border-bottom: 1px solid #2c2c2e; display: flex; justify-content: space-between; align-items: center; }
        #chat-flow { flex: 1; overflow-y: auto; padding: 40px; display: flex; flex-direction: column; gap: 25px; }
        
        .bubble { padding: 18px 24px; border-radius: 22px; max-width: 70%; line-height: 1.6; font-size: 1.05rem; position: relative; }
        .nova { background: var(--panel); align-self: flex-start; border: 1px solid #2c2c2e; }
        .user { background: var(--accent); align-self: flex-end; }
        
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 8px; background: #32d74b; box-shadow: 0 0 10px #32d74b; }

        .input-box { padding: 30px 40px; background: var(--bg); border-top: 1px solid #2c2c2e; display: flex; gap: 15px; }
        #userInput { flex: 1; background: #1c1c1e; border: 1px solid #3a3a3c; border-radius: 30px; padding: 16px 25px; color: white; outline: none; font-size: 1rem; }
        .action-btn { background: var(--panel); border: 1px solid #3a3a3c; color: white; width: 54px; height: 54px; border-radius: 50%; cursor: pointer; transition: 0.2s; }
        .action-btn:hover { border-color: var(--accent); color: var(--accent); }

        #version { position: absolute; bottom: 100px; right: 40px; font-size: 0.7rem; color: #444; pointer-events: none; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h3 style="margin-top:0">Neural Memory</h3>
        <div id="memory-list" style="overflow-y:auto"></div>
    </div>

    <div id="main">
        <header>
            <div><span class="status-dot"></span><b>NOVA_OS</b></div>
            <div style="font-size: 0.9rem; color: var(--text-dim)">Local Compute: 32GB RAM Detected</div>
        </header>

        <div id="chat-flow"></div>
        <div id="version">BUILD_2026_V1.1.000</div>

        <div class="input-box">
            <input type="file" id="imgIn" hidden accept="image/*">
            <button class="action-btn" onclick="document.getElementById('imgIn').click()">+</button>
            <input type="text" id="userInput" placeholder="Synthesize message..." autocomplete="off">
        </div>
    </div>

    <canvas id="pCanvas" style="display:none"></canvas>

    <script>
        /**
         * NOVA NEURAL ENGINE - CORE SCRIPT
         * Handles Persistence, Fuzzy Reasoning, and Vision OCR
         */
        const chat = document.getElementById('chat-flow');
        const input = document.getElementById('userInput');
        const memList = document.getElementById('memory-list');
        
        // --- DATABASE ARCHITECTURE (IndexedDB) ---
        let db;
        const request = indexedDB.open("NovaBrain", 1);
        request.onupgradeneeded = (e) => {
            db = e.target.result;
            db.createObjectStore("logs", { keyPath: "id", autoIncrement: true });
            db.createObjectStore("knowledge", { keyPath: "keyword" });
        };
        request.onsuccess = (e) => { 
            db = e.target.result; 
            loadSidebar(); 
            greet();
        };

        // --- BRAIN FUNCTIONS ---
        async function remember(type, content) {
            const tx = db.transaction("logs", "readwrite");
            tx.objectStore("logs").add({ type, content, timestamp: Date.now() });
            loadSidebar();
        }

        async function loadSidebar() {
            memList.innerHTML = "";
            const tx = db.transaction("logs", "readonly");
            tx.objectStore("logs").openCursor(null, 'prev').onsuccess = (e) => {
                const cursor = e.target.result;
                if (cursor) {
                    const el = document.createElement('div');
                    el.className = "mem-node";
                    el.innerText = `[${cursor.value.type}] ${cursor.value.content.substring(0, 30)}...`;
                    memList.appendChild(el);
                    cursor.continue();
                }
            };
        }

        // --- CONVERSATION LOGIC ---
        const personality = {
            greetings: ["Systems online.", "Memory sectors clear.", "Awaiting input, user."],
            unknown: ["Synthesizing new data... I don't recognize that yet.", "Information not found in local 1.5TB cache."]
        };

        function addMessage(who, text) {
            const b = document.createElement('div');
            b.className = `bubble ${who}`;
            b.innerHTML = text;
            chat.appendChild(b);
            chat.scrollTop = chat.scrollHeight;
            if(who === 'user') remember('CHAT', text);
        }

        function greet() {
            const r = personality.greetings[Math.floor(Math.random() * personality.greetings.length)];
            addMessage('nova', r);
        }

        // --- INPUT HANDLING ---
        input.addEventListener('keypress', (e) => {
            if(e.key === 'Enter' && input.value.trim()) {
                const m = input.value;
                input.value = "";
                addMessage('user', m);
                processThought(m);
            }
        });

        async function processThought(q) {
            const lower = q.toLowerCase();
            let res = personality.unknown[0];

            if(lower.includes("name")) res = "Nova. Built for local high-speed processing.";
            if(lower.includes("clear memory")) {
                db.transaction("logs", "readwrite").objectStore("logs").clear();
                location.reload();
            }
            
            setTimeout(() => addMessage('nova', res), 700);
        }

        // --- VISION ENGINE (OCR & Color) ---
        document.getElementById('imgIn').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if(!file) return;

            addMessage('user', `Uploaded Image: ${file.name}`);
            const logId = `vision-${Date.now()}`;
            addMessage('nova', `<span id="${logId}">Extracting neural data from pixels...</span>`);

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (ev) => {
                const img = new Image();
                img.src = ev.target.result;
                img.onload = async () => {
                    // OCR logic
                    try {
                        const out = await Tesseract.recognize(img.src, 'eng');
                        let text = out.data.text.trim();
                        let isYourAsset = text.toLowerCase().includes("dash01") || text.toLowerCase().includes("polar");
                        
                        document.getElementById(logId).innerHTML = `
                            <b>Visual Scan:</b><br>
                            - Identity: ${isYourAsset ? "Verified Dash01 Asset" : "External Data"}<br>
                            - Text: "${text || "No legible text"}"<br>
                            - Status: Cool.
                        `;
                        remember('VISION', text || "Image Scan");
                    } catch(err) {
                        document.getElementById(logId).innerText = "OCR Failure: Image noise too high.";
                    }
                };
            };
        });
    </script>
</body>
</html>
