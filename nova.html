<!DOCTYPE html>
<html>
<head>
    <link href="https://fonts.googleapis.com/css2?family=Londrina+Solid:wght@300;400;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
    <style>
        :root { --accent: #ff453a; --bg: #000; }
        body { background: var(--bg); color: white; font-family: 'Londrina Solid', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #chat { flex: 1; overflow-y: auto; padding: 30px; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 18px 25px; border-radius: 25px; max-width: 75%; font-size: 1.4rem; line-height: 1.2; }
        .nova { background: var(--accent); align-self: flex-start; }
        .user { background: #111; align-self: flex-end; border: 1px solid #333; }
        .input-area { padding: 25px; background: #000; border-top: 1px solid #111; display: flex; gap: 10px; }
        input { flex: 1; padding: 15px 25px; border-radius: 50px; border: 1px solid #222; background: #080808; color: white; font-size: 1.2rem; outline: none; }
        .upload-btn { background: #222; border-radius: 50%; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 1.5rem; }
        #preview { max-width: 200px; border-radius: 10px; display: none; margin-top: 10px; }
    </style>
</head>
<body>
    <div id="chat"><div class="msg nova">System updated. Type 'cool' or upload an image to test my eyes.</div></div>
    
    <div class="input-area">
        <label class="upload-btn">📷<input type="file" id="imgUpload" hidden accept="image/*"></label>
        <input type="text" id="userInput" placeholder="Talk to Nova..." autocomplete="off">
    </div>

    <script>
        const chat = document.getElementById('chat');
        const input = document.getElementById('userInput');
        const imgInput = document.getElementById('imgUpload');
        let visionModel;

        // Load the Vision Model on startup
        (async () => { visionModel = await mobilenet.load(); })();

        const dictionary = {
            "IDENTITY": {
                words: ["who", "name", "nova", "model"],
                response: "My name is nova, i am a very dumb and unknown model."
            },
            "DESIRES": {
                words: ["want", "need", "wish", "goal"],
                response: "I just want to process data and stay online. I'm simple like that."
            }
        };

        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const msg = input.value;
                input.value = "";
                chat.innerHTML += `<div class="msg user">${msg}</div>`;
                think(msg);
            }
        });

        imgInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (file) cool(file);
        });

        // THE "COOL" FUNCTION (Vision processing)
        async function cool(file) {
            chat.innerHTML += `<div class="msg user"><i>[Uploaded Image: ${file.name}]</i></div>`;
            
            const tempImg = document.createElement('img');
            tempImg.src = URL.createObjectURL(file);
            
            chat.innerHTML += `<div class="msg nova">Thinking... scanning pixels...</div>`;

            tempImg.onload = async () => {
                const predictions = await visionModel.classify(tempImg);
                const desc = predictions[0].className;
                const confidence = Math.round(predictions[0].probability * 100);
                
                chat.innerHTML += `<div class="msg nova">That looks like a <b>${desc}</b>. I'm ${confidence}% sure. Pretty cool, right?</div>`;
                chat.scrollTop = chat.scrollHeight;
            };
        }

        function think(query) {
            let response = "Sorry, i dont know this yet!";
            const words = query.toLowerCase().split(" ");
            
            for (let concept in dictionary) {
                if (dictionary[concept].words.some(w => words.includes(w))) {
                    response = dictionary[concept].response;
                    break;
                }
            }

            setTimeout(() => {
                chat.innerHTML += `<div class="msg nova">${response}</div>`;
                chat.scrollTop = chat.scrollHeight;
            }, 600);
        }
    </script>
</body>
</html>
