<!DOCTYPE html>
<html>
<head>
    <link href="https://fonts.googleapis.com/css2?family=Londrina+Solid:wght@300;400;900&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: white; font-family: 'Londrina Solid', sans-serif; display: flex; flex-direction: column; height: 100vh; margin: 0; overflow: hidden; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; background: #050505; scroll-behavior: smooth; }
        .msg { padding: 15px 25px; border-radius: 25px; max-width: 75%; font-size: 1.4rem; animation: pop 0.3s ease; }
        .nova { background: #ff453a; align-self: flex-start; border-bottom-left-radius: 2px; }
        .user { background: #1a1a1a; align-self: flex-end; border-bottom-right-radius: 2px; border: 1px solid #333; }
        .header { padding: 20px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
        #think-ui { display: none; color: #ff453a; font-size: 0.8rem; letter-spacing: 3px; font-weight: 300; }
        .input-area { padding: 25px; display: flex; background: #000; border-top: 1px solid #222; }
        input { flex: 1; padding: 18px; border-radius: 40px; border: 1px solid #333; font-size: 1.2rem; background: #111; color: white; outline: none; }
        @keyframes pop { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>
    <div class="header">
        <span style="font-size: 2rem;">NOVA <small style="color:#ff453a; font-size:0.7rem">GPU ACCELERATED</small></span>
        <div id="think-ui">ANALYZING NEURAL TENSORS...</div>
    </div>

    <div id="chat">
        <div class="msg nova">Nova initialized. Utilizing local hardware. How can I help?</div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Ask Nova anything..." autocomplete="off">
    </div>

    <script>
        const input = document.getElementById('userInput');
        const chat = document.getElementById('chat');
        const thinkUI = document.getElementById('think-ui');

        // Nova's "Deep Knowledge Base"
        const knowledge = [
            { input: ["hi", "hello", "hey", "yo"], output: "Greetings! My neural pathways are clear. How are you?" },
            { input: ["who are you", "what are you"], output: "I am Nova, the advanced intelligence driving the Polar Project." },
            { input: ["polar project", "what is this"], output: "The Polar Project is a high-performance digital environment built on Londrina Solid design." },
            { input: ["help", "what can you do"], output: "I can discuss the Polar Project, analyze your inputs, or just chat!" },
            { input: ["bye", "goodbye"], output: "Powering down. See you in the next session." }
        ];

        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && input.value.trim() !== "") {
                const text = input.value.trim();
                input.value = "";
                process(text);
            }
        });

        function process(query) {
            chat.innerHTML += `<div class="msg user">${query}</div>`;
            chat.scrollTop = chat.scrollHeight;

            const tokens = query.toLowerCase().split(" ");
            let bestMatch = null;
            let highestScore = 0;

            // Neural Similarity Check
            knowledge.forEach(item => {
                let score = 0;
                item.input.forEach(keyword => {
                    if (query.toLowerCase().includes(keyword)) score += 1;
                });
                if (score > highestScore) {
                    highestScore = score;
                    bestMatch = item.output;
                }
            });

            // LOGIC GATE: If it's a short "hi", answer fast. 
            // If it's a long question, "Think" for 5 seconds.
            const isComplex = query.length > 10;
            const thinkTime = isComplex ? (Math.random() * 3000 + 2000) : 300;

            if (isComplex) thinkUI.style.display = "block";

            setTimeout(() => {
                thinkUI.style.display = "none";
                
                // CONFIDENCE THRESHOLD
                let finalResponse = (highestScore > 0) ? bestMatch : "Sorry, I don't know this yet!";
                
                chat.innerHTML += `<div class="msg nova">${finalResponse}</div>`;
                chat.scrollTop = chat.scrollHeight;
            }, thinkTime);
        }
    </script>
</body>
</html>
