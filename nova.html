<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova v0.5 | GitHub Core</title>
    <style>
        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: #343541;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #ececf1;
            overflow: hidden;
        }

        #app { display: flex; flex-direction: column; height: 100vh; }

        /* Chat Window */
        #chat-window {
            flex: 1; overflow-y: auto; display: flex; flex-direction: column;
            padding-bottom: 150px;
        }

        .message-row {
            width: 100%; padding: 24px 40px;
            display: flex; justify-content: flex-start;
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }

        .user-row { background-color: #343541; }
        .nova-row { background-color: #444654; }

        .content-wrapper {
            max-width: 100%;
            display: flex; align-items: flex-start; gap: 20px;
        }

        /* Avatars */
        .avatar {
            width: 36px; height: 36px; border-radius: 2px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 600; font-size: 14px; color: white; flex-shrink: 0;
        }
        .user-avatar { background: #5436da; }
        .nova-avatar { background: #10a37f; }

        /* Thinking & Status UI */
        .status-tag {
            font-size: 11px; color: #10a37f; border: 1px solid #10a37f;
            padding: 2px 6px; border-radius: 4px; margin-bottom: 10px;
            display: inline-block; text-transform: uppercase;
        }

        .thinking-block {
            font-size: 13px; color: #9ca3af; margin-bottom: 12px;
            font-family: monospace; line-height: 1.4;
        }

        .text-box { font-size: 16px; line-height: 1.6; white-space: pre-wrap; word-wrap: break-word; }

        /* Input Zone */
        .input-area {
            position: fixed; bottom: 0; left: 0; width: 100%;
            padding: 20px 0 40px 0;
            background: linear-gradient(180deg, rgba(52,53,65,0), #343541 70%);
            display: flex; justify-content: center;
        }

        .input-container {
            max-width: 90%; width: 1000px; position: relative;
            background: #40414f; border-radius: 6px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
        }

        #userInput {
            width: 100%; background: transparent; border: none;
            color: white; padding: 14px 45px 14px 16px;
            font-size: 16px; outline: none; resize: none;
            font-family: inherit; min-height: 52px;
        }

        .send-btn {
            position: absolute; right: 12px; bottom: 12px;
            background: transparent; border: none; cursor: pointer; color: #acacbe;
        }
    </style>
</head>
<body>

<div id="app">
    <div id="chat-window">
        <div class="message-row nova-row">
            <div class="content-wrapper">
                <div class="avatar nova-avatar">N</div>
                <div class="text-box" id="init-text">Initializing Nova Core... Fetching weights from GitHub.</div>
            </div>
        </div>
    </div>

    <div class="input-area">
        <div class="input-container">
            <textarea id="userInput" placeholder="Ask Nova anything..." rows="1"></textarea>
            <button class="send-btn" id="sendBtn">
                <svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" height="18" width="18"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>
    </div>
</div>

<script>
    const BIN_URL = "https://raw.githubusercontent.com/sigmavr62-max/Nova-Project/refs/heads/main/nova_core.bin";
    let brainLoaded = false;
    let modelWeights = null;

    const chat = document.getElementById('chat-window');
    const input = document.getElementById('userInput');
    const btn = document.getElementById('sendBtn');

    // 1. LOAD THE .BIN DIRECTLY FROM GITHUB
    async function bootNova() {
        try {
            const response = await fetch(BIN_URL);
            if (!response.ok) throw new Error("GitHub Link Offline");
            
            const buffer = await response.arrayBuffer();
            modelWeights = new Uint8Array(buffer); // Loading the 16GB-tier binary data
            brainLoaded = true;
            document.getElementById('init-text').innerText = "Nova v0.5 Pro Online. Binary weights synchronized via GitHub Raw. How can I assist?";
        } catch (err) {
            document.getElementById('init-text').innerText = "FATAL ERROR: Could not reach GitHub repository. Check URL or Repo Privacy.";
        }
    }

    function createRow(text, isUser, isThinking = false) {
        const row = document.createElement('div');
        row.className = `message-row ${isUser ? 'user-row' : 'nova-row'}`;
        row.innerHTML = `
            <div class="content-wrapper">
                <div class="avatar ${isUser ? 'user-avatar' : 'nova-avatar'}">${isUser ? 'U' : 'N'}</div>
                <div class="text-box">
                    ${isThinking ? '<div class="status-tag">Thinking</div><div class="thinking-block">>> Parsing binary parameters...<br>>> Analyzing local weight buffers...</div>' : text}
                </div>
            </div>
        `;
        chat.appendChild(row);
        chat.scrollTop = chat.scrollHeight;
        return row;
    }

    async function handleInference(userMsg) {
        if (!brainLoaded) return;
        
        const thinkingRow = createRow("", false, true);
        
        // Simulating the Advanced Thinking process using the .bin data
        await new Promise(r => setTimeout(r, 1500)); 
        
        const paramCount = modelWeights.length;
        let response = `Inference Complete: My custom architecture (based on ${paramCount} parameters) has processed your request. `;
        
        if (userMsg.toLowerCase().includes("dash01")) {
            response += "Project 'Dash01 Studios' prioritized in active memory.";
        } else {
            response += "Ready for the next technical instruction.";
        }

        thinkingRow.querySelector('.text-box').innerHTML = response;
    }

    function sendMessage() {
        const msg = input.value.trim();
        if (msg && brainLoaded) {
            createRow(msg, true);
            input.value = '';
            handleInference(msg);
        }
    }

    btn.addEventListener('click', sendMessage);
    input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    // Start the boot sequence
    bootNova();
</script>

</body>
</html>
