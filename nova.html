<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nova Neural Training Core</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        :root { --bg: #050505; --accent: #007aff; --panel: #121214; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; display: flex; height: 100vh; }
        
        /* Training Sidebar */
        #training-bay { width: 350px; background: var(--panel); border-right: 1px solid #222; display: flex; flex-direction: column; padding: 20px; overflow-y: auto; }
        .memory-card { background: #1c1c1e; border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid #333; font-size: 0.85rem; }
        .memory-card img { width: 100%; border-radius: 6px; margin-bottom: 10px; }
        
        /* Main Chat */
        #viewport { flex: 1; display: flex; flex-direction: column; }
        #chat-area { flex: 1; padding: 40px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
        .bubble { padding: 15px 20px; border-radius: 18px; max-width: 75%; line-height: 1.5; }
        .nova { background: var(--panel); align-self: flex-start; border: 1px solid #222; }
        .user { background: var(--accent); align-self: flex-end; }

        .input-wrap { padding: 30px; background: var(--bg); border-top: 1px solid #222; display: flex; gap: 15px; }
        #userInput { flex: 1; background: #1c1c1e; border: 1px solid #333; border-radius: 25px; padding: 15px 20px; color: white; outline: none; }
        .btn { background: var(--panel); border: 1px solid #333; color: white; padding: 10px 20px; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>

<div id="training-bay">
    <h2 style="color: var(--accent)">Neural Training Bay</h2>
    <p style="font-size: 0.8rem; color: #666">Long-term visual memory (IndexedDB)</p>
    <div id="memory-vessel"></div>
</div>

<div id="viewport">
    <div id="chat-area">
        <div class="bubble nova">Training Core Online. Upload assets to teach my neural pathways.</div>
    </div>
    <div class="input-wrap">
        <input type="file" id="fileIn" hidden accept="image/*">
        <button class="btn" onclick="document.getElementById('fileIn').click()">Upload Asset</button>
        <input type="text" id="userInput" placeholder="Teach me about this image...">
    </div>
</div>

<script>
    const vessel = document.getElementById('memory-vessel');
    const chat = document.getElementById('chat-area');
    const fileIn = document.getElementById('fileIn');
    const input = document.getElementById('userInput');

    // --- DATABASE ENGINE (IndexedDB) ---
    let db;
    const dbReq = indexedDB.open("NovaVision", 1);
    dbReq.onupgradeneeded = (e) => {
        db = e.target.result;
        db.createObjectStore("vision_memory", { keyPath: "id", autoIncrement: true });
    };
    dbReq.onsuccess = (e) => { db = e.target.result; syncMemory(); };

    // --- TRAINING LOGIC ---
    let pendingImage = null;

    fileIn.onchange = (e) => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (ev) => {
            pendingImage = ev.target.result;
            addMessage('nova', "Image received. Tell me: **What does this image actually mean?**");
        };
    };

    input.onkeypress = (e) => {
        if(e.key === 'Enter' && input.value.trim()) {
            const val = input.value;
            input.value = "";
            addMessage('user', val);
            
            if(pendingImage) {
                trainNova(pendingImage, val);
            } else {
                addMessage('nova', "Processing thought...");
            }
        }
    };

    async function trainNova(imgData, meaning) {
        // Deep OCR Scan for automated tagging
        const ocr = await Tesseract.recognize(imgData, 'eng');
        const textFound = ocr.data.text.trim();

        const entry = {
            image: imgData,
            meaning: meaning,
            ocr_text: textFound,
            timestamp: Date.now()
        };

        const tx = db.transaction("vision_memory", "readwrite");
        tx.objectStore("vision_memory").add(entry);
        tx.oncomplete = () => {
            pendingImage = null;
            addMessage('nova', `Neural pathway updated. I now understand this image means: "${meaning}"`);
            syncMemory();
        };
    }

    function syncMemory() {
        vessel.innerHTML = "";
        const tx = db.transaction("vision_memory", "readonly");
        tx.objectStore("vision_memory").openCursor(null, 'prev').onsuccess = (e) => {
            const cursor = e.target.result;
            if(cursor) {
                const card = document.createElement('div');
                card.className = "memory-card";
                card.innerHTML = `
                    <img src="${cursor.value.image}">
                    <b>Meaning:</b> ${cursor.value.meaning}<br>
                    <b>AI Read:</b> "${cursor.value.ocr_text.substring(0,30)}..."
                `;
                vessel.appendChild(card);
                cursor.continue();
            }
        };
    }

    function addMessage(who, text) {
        const b = document.createElement('div');
        b.className = `bubble ${who}`;
        b.innerHTML = text;
        chat.appendChild(b);
        chat.scrollTop = chat.scrollHeight;
    }
</script>
</body>
</html>
