<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Core v1.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    
    <style>
        :root { 
            --bg: #0a0a0b; 
            --panel: #161618;
            --accent: #007aff; /* SF Pro Blue */
            --text-main: #ffffff;
            --text-dim: #a1a1a6;
            --user-bubble: #2c2c2e;
        }

        body { 
            background: var(--bg); 
            color: var(--text-main); 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Inter", sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden; 
        }

        /* Authentication UI */
        #auth-overlay { 
            position: fixed; inset: 0; background: var(--bg); z-index: 1000; 
            display: flex; align-items: center; justify-content: center; 
        }
        .auth-card { 
            background: var(--panel); padding: 40px; border-radius: 24px; 
            border: 1px solid #2c2c2e; width: 320px; text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .auth-card input { 
            width: 100%; margin-bottom: 12px; padding: 14px; border-radius: 12px; 
            border: 1px solid #3a3a3c; background: #000; color: #fff; 
            font-family: inherit; box-sizing: border-box;
        }
        .auth-btn { 
            background: var(--accent); color: white; border: none; padding: 14px; 
            border-radius: 12px; cursor: pointer; width: 100%; font-weight: 600;
        }

        /* Main Layout */
        header { 
            padding: 20px 30px; border-bottom: 1px solid #2c2c2e; 
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(10, 10, 11, 0.8); backdrop-filter: blur(10px);
        }
        #version-tag { color: var(--text-dim); font-size: 0.8rem; letter-spacing: 1px; }

        #chat { flex: 1; overflow-y: auto; padding: 30px; display: flex; flex-direction: column; gap: 20px; }
        .msg { padding: 16px 20px; border-radius: 18px; max-width: 80%; line-height: 1.5; font-size: 1rem; }
        .nova { background: var(--panel); align-self: flex-start; border: 1px solid #2c2c2e; }
        .user { background: var(--accent); align-self: flex-end; color: white; }

        .input-area { 
            padding: 30px; background: var(--bg); border-top: 1px solid #2c2c2e; 
            display: flex; gap: 12px; align-items: center; 
        }
        #userInput { 
            flex: 1; padding: 16px 24px; border-radius: 30px; 
            border: 1px solid #3a3a3c; background: #1c1c1e; color: white; 
            font-size: 1rem; outline: none; transition: border 0.2s;
        }
        #userInput:focus { border-color: var(--accent); }
        
        .icon-btn { 
            background: #1c1c1e; border: 1px solid #3a3a3c; color: white; 
            width: 50px; height: 50px; border-radius: 50%; cursor: pointer; 
            display: flex; align-items: center; justify-content: center; font-size: 1.2rem;
        }

        canvas { display: none; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="auth-card">
            <h2 style="margin-top:0">Nova Core</h2>
            <input type="text" id="regUser" placeholder="Username">
            <input type="password" id="regPass" placeholder="Password">
            <button class="auth-btn" onclick="handleAuth()">Sign In</button>
            <p id="auth-msg" style="color:var(--accent); font-size:0.8rem; margin-top:15px;"></p>
        </div>
    </div>

    <header>
        <span style="font-weight:600; font-size:1.2rem;">NOVA</span>
        <div id="version-tag">VER_1.0.100</div>
    </header>

    <div id="chat">
        <div class="msg nova">System initialized. Obsidian UI active. Ready for image and text analysis.</div>
    </div>

    <div class="input-area">
        <input type="file" id="imgInput" hidden accept="image/*">
        <button class="icon-btn" onclick="document.getElementById('imgInput').click()">📷</button>
        <input type="text" id="userInput" placeholder="Ask anything..." autocomplete="off">
    </div>

    <canvas id="procCanvas"></canvas>

    <script>
        const chat = document.getElementById('chat');
        const input = document.getElementById('userInput');
        const verTag = document.getElementById('version-tag');
        const canvas = document.getElementById('procCanvas');
        const ctx = canvas.getContext('2d');

        let version = parseInt(localStorage.getItem('novaVersion')) || 100;
        let imageMemory = JSON.parse(localStorage.getItem('nova_image_memory')) || [];

        function checkLogin() {
            if (localStorage.getItem('nova_session')) {
                document.getElementById('auth-overlay').style.display = 'none';
                verTag.innerText = `VER_1.0.${version}`;
            }
        }

        function handleAuth() {
            const u = document.getElementById('regUser').value;
            if (u.length > 2) {
                localStorage.setItem('nova_session', u);
                location.reload();
            }
        }

        function bump() {
            version++;
            localStorage.setItem('novaVersion', version);
            verTag.innerText = `VER_1.0.${version}`;
        }

        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && input.value.trim()) {
                const val = input.value;
                input.value = "";
                chat.innerHTML += `<div class="msg user">${val}</div>`;
                bump();
                setTimeout(() => {
                    let r = "I'm sorry, I don't have a response for that yet.";
                    if(val.toLowerCase().includes("who")) r = "My name is Nova, a simple local model.";
                    chat.innerHTML += `<div class="msg nova">${r}</div>`;
                    chat.scrollTop = chat.scrollHeight;
                }, 600);
            }
        });

        document.getElementById('imgInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            bump();
            
            chat.innerHTML += `<div class="msg user">Uploaded: ${file.name}</div>`;
            const logId = `log-${Date.now()}`;
            chat.innerHTML += `<div class="msg nova" id="${logId}">Analyzing image layers...</div>`;
            chat.scrollTop = chat.scrollHeight;

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (ev) => {
                const img = new Image();
                img.src = ev.target.result;
                img.onload = async () => {
                    // Deep Scan Pre-processing
                    canvas.width = img.width; canvas.height = img.height;
                    ctx.filter = 'contrast(1.4) grayscale(0.2)';
                    ctx.drawImage(img, 0, 0);

                    const memoryMatch = imageMemory.includes(file.name + file.size);
                    if(!memoryMatch) imageMemory.push(file.name + file.size);
                    localStorage.setItem('nova_image_memory', JSON.stringify(imageMemory));

                    try {
                        const out = await Tesseract.recognize(canvas, 'eng');
                        const text = out.data.text.replace(/[^a-zA-Z0-9\s]/g, '').trim();
                        const isOwner = text.toLowerCase().includes("dash01") || text.toLowerCase().includes("polar");

                        document.getElementById(logId).innerHTML = `
                            <b>Analysis Result:</b><br>
                            ${memoryMatch ? "• Recognized from memory.<br>" : "• New image signature.<br>"}
                            ${isOwner ? "• <b>Identity Confirmed: Dash01/Polar asset.</b><br>" : "• Identity: Non-proprietary image.<br>"}
                            <br><b>Extracted Text:</b><br>"${text || "None detected"}"
                        `;
                    } catch (err) {
                        document.getElementById(logId).innerText = "OCR error. Image too complex.";
                    }
                    chat.scrollTop = chat.scrollHeight;
                };
            };
        });

        checkLogin();
    </script>
</body>
</html>
