<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nova v0.5 - 16GB Pro Tier</title>
    <style>
        * { box-sizing: border-box; }
        body { background: #343541; color: #ececf1; font-family: ui-sans-serif, system-ui, sans-serif; margin: 0; }
        
        #app { display: flex; flex-direction: column; height: 100vh; }
        #chat-window { flex: 1; overflow-y: auto; padding-bottom: 120px; }

        .message-row { width: 100%; padding: 32px 40px; display: flex; justify-content: flex-start; border-bottom: 1px solid rgba(0,0,0,0.1); }
        .user-row { background: #343541; }
        .nova-row { background: #444654; }

        .content { display: flex; gap: 24px; max-width: 100%; width: 100%; }
        .avatar { width: 36px; height: 36px; border-radius: 2px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .user-avatar { background: #5436da; }
        .nova-avatar { background: #10a37f; }

        /* THINKING BLOCK - From the Gary Explains video */
        .thought-process {
            background: rgba(0,0,0,0.2);
            border-left: 3px solid #10a37f;
            padding: 12px 16px;
            margin-bottom: 15px;
            font-family: monospace;
            font-size: 13px;
            color: #9ca3af;
            border-radius: 4px;
        }

        .final-text { font-size: 16px; line-height: 1.6; white-space: pre-wrap; }

        /* Modern Input */
        .input-box { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 800px; max-width: 90%; background: #40414f; border-radius: 8px; box-shadow: 0 0 20px rgba(0,0,0,0.3); display: flex; padding: 8px; }
        #userInput { flex: 1; background: transparent; border: none; color: white; padding: 12px; font-size: 16px; outline: none; resize: none; max-height: 200px; }
        #sendBtn { background: #10a37f; border: none; border-radius: 4px; color: white; padding: 0 16px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="app">
    <div id="chat-window">
        <div class="message-row nova-row">
            <div class="content">
                <div class="avatar nova-avatar">N</div>
                <div class="final-text">Nova 16GB Logic Core Active. I am now capable of Chain-of-Thought reasoning. How shall we proceed?</div>
            </div>
        </div>
    </div>

    <div class="input-box">
        <textarea id="userInput" placeholder="Send a message..." rows="1"></textarea>
        <button id="sendBtn">Send</button>
    </div>
</div>

<script>
    const chat = document.getElementById('chat-window');
    const input = document.getElementById('userInput');
    const btn = document.getElementById('sendBtn');

    function addRow(isUser, thought = "", text = "") {
        const row = document.createElement('div');
        row.className = `message-row ${isUser ? 'user-row' : 'nova-row'}`;
        
        let inner = `<div class="content">
            <div class="avatar ${isUser ? 'user-avatar' : 'nova-avatar'}">${isUser ? 'U' : 'N'}</div>
            <div style="flex:1">
                ${thought ? `<div class="thought-process">${thought}</div>` : ''}
                <div class="final-text">${text}</div>
            </div>
        </div>`;
        
        row.innerHTML = inner;
        chat.appendChild(row);
        chat.scrollTop = chat.scrollHeight;
        return row;
    }

    async function processLogic(userText) {
        // Start "Thinking"
        const row = addRow(false, "Initializing 16GB Reasoning Core...<br>> Analyzing tokens<br>> Checking history/facts database", "");
        const tBox = row.querySelector('.thought-process');
        const fBox = row.querySelector('.final-text');

        // Step 1: Thinking Simulation
        await new Promise(r => setTimeout(r, 1200));
        tBox.innerHTML += "<br>> Intent: Creative/Technical Analysis<br>> Strategy: Multi-step verification";
        
        // Step 2: Final Answer Generation
        setTimeout(() => {
            let response = "";
            const msg = userText.toLowerCase();

            if(msg.includes("code") || msg.includes("python")) {
                response = "Since I am in 16GB mode, I can handle complex code logic. I suggest a modular approach for the Dash01 automation scripts.";
            } else if(msg.includes("history") || msg.includes("who")) {
                response = "16GB Logic: Accessing factual database. My knowledge base now includes historical events and complex world facts.";
            } else {
                response = "Reasoning complete. My internal weights suggest a balanced technical response is best for this prompt.";
            }

            fBox.innerText = response;
        }, 800);
    }

    btn.addEventListener('click', () => {
        const val = input.value.trim();
        if(val) {
            addRow(true, "", val);
            input.value = "";
            processLogic(val);
        }
    });

    input.addEventListener('keydown', (e) => {
        if(e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            btn.click();
        }
    });
</script>
</body>
</html>
