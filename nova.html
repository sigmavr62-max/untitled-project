<!DOCTYPE html>
<html>
<head>
    <link href="https://fonts.googleapis.com/css2?family=Londrina+Solid:wght@300;400;900&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: white; font-family: 'Londrina Solid', sans-serif; display: flex; flex-direction: column; height: 100vh; margin: 0; overflow: hidden; }
        #chat { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 18px; background: radial-gradient(circle at 50% 50%, #0a0a1a 0%, #000 100%); scroll-behavior: smooth; }
        .msg { padding: 18px 25px; border-radius: 28px; max-width: 80%; font-size: 1.4rem; line-height: 1.3; position: relative; animation: slideUp 0.4s ease; }
        .nova { background: #ff453a; align-self: flex-start; border-bottom-left-radius: 2px; box-shadow: 0 10px 30px rgba(255, 69, 58, 0.15); }
        .user { background: #111; align-self: flex-end; border-bottom-right-radius: 2px; border: 1px solid #333; color: #eee; }
        .header { padding: 20px 30px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); z-index: 10; }
        #status-light { width: 12px; height: 12px; background: #0f0; border-radius: 50%; box-shadow: 0 0 10px #0f0; transition: 0.3s; }
        #think-label { color: #ff453a; font-size: 0.8rem; letter-spacing: 4px; display: none; font-weight: 300; }
        .input-area { padding: 30px; background: #000; border-top: 1px solid #222; }
        input { width: 100%; padding: 20px; border-radius: 50px; border: 1px solid #333; font-size: 1.3rem; background: #0a0a0a; color: white; outline: none; transition: 0.3s; box-sizing: border-box; }
        input:focus { border-color: #ff453a; box-shadow: 0 0 20px rgba(255, 69, 58, 0.2); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="header">
        <div style="display:flex; align-items:center; gap:15px;">
            <div id="status-light"></div>
            <span style="font-size: 2.2rem; letter-spacing: 1px;">NOVA <small style="color:#555; font-size: 0.8rem;">LEXICON_v3</small></span>
        </div>
        <div id="think-label">ACCESSING ENGLISH DICTIONARY...</div>
    </div>

    <div id="chat">
        <div class="msg nova">Nova online. Whole English Dictionary linked. Ask me the meaning of any word.</div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Type a word or sentence..." autocomplete="off">
    </div>

    <script>
        const input = document.getElementById('userInput');
        const chat = document.getElementById('chat');
        const light = document.getElementById('status-light');
        const label = document.getElementById('think-label');

        input.addEventListener('keypress', async (e) => {
            if (e.key === 'Enter' && input.value.trim() !== "") {
                const query = input.value.trim();
                input.value = "";
                await processNeuralRequest(query);
            }
        });

        async function processNeuralRequest(query) {
            // 1. Post User Input
            chat.innerHTML += `<div class="msg user">${query}</div>`;
            chat.scrollTop = chat.scrollHeight;

            // 2. UI Thinking State
            light.style.background = "#ff453a";
            light.style.boxShadow = "0 0 15px #ff453a";
            label.style.display = "block";

            // 3. Logic: If it's a greeting, answer fast. If it's a word, "Think" & Fetch.
            const words = query.toLowerCase().split(" ");
            const targetWord = words[words.length - 1].replace(/[^\w]/g, ""); // Get last word, clean it
            
            const isGreeting = ["hi", "hello", "yo", "hey"].includes(targetWord);
            const waitTime = isGreeting ? 400 : (Math.random() * 3000 + 2000);

            setTimeout(async () => {
                let finalResponse = "Sorry, i dont know this yet!";

                if (isGreeting) {
                    finalResponse = "Greetings. Ready to define the world.";
                } else {
                    try {
                        // Fetching from the whole English Dictionary
                        const response = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${targetWord}`);
                        const data = await response.json();

                        if (data[0] && data[0].meanings[0]) {
                            const def = data[0].meanings[0].definitions[0].definition;
                            finalResponse = `The word '${targetWord}' means: ${def}`;
                        }
                    } catch (err) {
                        finalResponse = "Sorry, i dont know this yet!";
                    }
                }

                // 4. Return UI to normal
                label.style.display = "none";
                light.style.background = "#0f0";
                light.style.boxShadow = "0 0 10px #0f0";

                chat.innerHTML += `<div class="msg nova">${finalResponse}</div>`;
                chat.scrollTop = chat.scrollHeight;

            }, waitTime);
        }
    </script>
</body>
</html>
