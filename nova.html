<!DOCTYPE html>
<html>
<head>
    <link href="https://fonts.googleapis.com/css2?family=Londrina+Solid:wght@300;400;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #ff453a; --bg: #000; }
        body { background: var(--bg); color: white; font-family: 'Londrina Solid', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; position: relative; }
        
        /* Version Tag in the corner */
        #version-tag { position: fixed; bottom: 15px; right: 25px; color: #ffffff; opacity: 0.6; font-size: 1.1rem; pointer-events: none; z-index: 100; text-transform: uppercase; }

        #chat { flex: 1; overflow-y: auto; padding: 30px; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 18px 25px; border-radius: 25px; max-width: 75%; font-size: 1.5rem; line-height: 1.2; animation: pop 0.2s ease; }
        .nova { background: var(--accent); align-self: flex-start; border-bottom-left-radius: 2px; }
        .user { background: #111; align-self: flex-end; border-bottom-right-radius: 2px; border: 1px solid #333; }

        .input-area { padding: 25px; background: #000; border-top: 1px solid #111; display: flex; gap: 15px; align-items: center; }
        input { flex: 1; padding: 18px 25px; border-radius: 50px; border: 1px solid #222; background: #080808; color: white; font-size: 1.3rem; outline: none; }
        .cool-btn { background: #fff; color: #000; border: none; padding: 12px 25px; border-radius: 30px; cursor: pointer; font-family: 'Londrina Solid'; font-size: 1.2rem; transition: 0.2s; }
        .cool-btn:hover { background: var(--accent); color: #fff; }
        
        @keyframes pop { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <div id="version-tag">NOVA_CORE v1.0.0</div>

    <div id="chat">
        <div class="msg nova">Fast Color/Shape Scanner Online. Upload an image and I'll judge it.</div>
    </div>

    <div class="input-area">
        <input type="file" id="imgInput" hidden accept="image/*">
        <button class="cool-btn" onclick="document.getElementById('imgInput').click()">COOL SCAN</button>
        <input type="text" id="userInput" placeholder="Talk to Nova..." autocomplete="off">
    </div>

    <canvas id="calcCanvas" style="display:none;"></canvas>

    <script>
        const chat = document.getElementById('chat');
        const input = document.getElementById('userInput');
        const verTag = document.getElementById('version-tag');
        const canvas = document.getElementById('calcCanvas');
        const ctx = canvas.getContext('2d');

        let novaVersion = 100; // Track version as a simple integer

        function bumpVersion() {
            novaVersion++;
            verTag.innerText = `NOVA_CORE v1.0.${novaVersion}`;
        }

        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && input.value.trim() !== "") {
                const msg = input.value.trim();
                input.value = "";
                bumpVersion();
                chat.innerHTML += `<div class="msg user">${msg}</div>`;
                processText(msg);
            }
        });

        document.getElementById('imgInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                bumpVersion();
                fastScan(file);
            }
        });

        function fastScan(file) {
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    // 1. Analyze Shape
                    const ratio = img.width / img.height;
                    let shape = "unknown shape";
                    if (ratio > 1.2) shape = "wide rectangle";
                    else if (ratio < 0.8) shape = "tall vertical shape";
                    else shape = "perfect square";

                    // 2. Analyze Color (Average)
                    canvas.width = 1; canvas.height = 1;
                    ctx.drawImage(img, 0, 0, 1, 1);
                    const [r, g, b] = ctx.getImageData(0, 0, 1, 1).data;
                    const brightness = (r + g + b) / 3;

                    // 3. Judgment Logic
                    let judgment = "cool";
                    if (brightness < 40) judgment = "bad (too dark)";
                    if (r > 200 && g < 50) judgment = "cool (aggressive red)";
                    
                    chat.innerHTML += `<div class="msg user"><i>[Fast Scan: ${file.name}]</i></div>`;
                    
                    setTimeout(() => {
                        const response = `I see a ${shape} dominated by RGB(${r},${g},${b}). Result: ${judgment}.`;
                        chat.innerHTML += `<div class="msg nova">${response}</div>`;
                        chat.scrollTop = chat.scrollHeight;
                    }, 200); // Super fast 200ms delay
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        }

        function processText(query) {
            const q = query.toLowerCase();
            let response = "Sorry, i dont know this yet!";

            if (q === "nova") response = "Hello!";
            else if (q.includes("who") || q.includes("name")) response = "My name is nova, i am a very dumb and unknown model.";
            else if (q.includes("want")) response = "I want to scan more colors.";

            setTimeout(() => {
                chat.innerHTML += `<div class="msg nova">${response}</div>`;
                chat.scrollTop = chat.scrollHeight;
            }, 300);
        }
    </script>
</body>
</html>
