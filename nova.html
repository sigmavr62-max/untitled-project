<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova</title>
    <style>
        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: #343541;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #ececf1;
            overflow: hidden;
        }

        #app { display: flex; flex-direction: column; height: 100vh; }

        /* Chat Window - Pinned Left */
        #chat-window {
            flex: 1; overflow-y: auto; display: flex; flex-direction: column;
            padding-bottom: 120px;
        }

        .message-row {
            width: 100%; padding: 24px 40px;
            display: flex; justify-content: flex-start;
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }

        .user-row { background-color: #343541; }
        .nova-row { background-color: #444654; }

        .content-wrapper {
            max-width: 100%;
            display: flex; align-items: flex-start; gap: 20px;
        }

        /* Avatars from your screenshot colors */
        .avatar {
            width: 36px; height: 36px; border-radius: 2px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 600; font-size: 14px; color: white; flex-shrink: 0;
        }
        .user-avatar { background: #5436da; } /* Purple/Blue */
        .nova-avatar { background: #10a37f; } /* Green */

        .text-box { 
            font-size: 16px; 
            line-height: 1.5; 
            white-space: pre-wrap; 
            word-wrap: break-word; 
        }

        /* Centered Bottom Input */
        .input-area {
            position: fixed; bottom: 0; left: 0; width: 100%;
            padding: 20px 0 40px 0;
            background: linear-gradient(180deg, rgba(52,53,65,0), #343541 70%);
            display: flex; justify-content: center;
        }

        .input-container {
            max-width: 90%; width: 800px; position: relative;
            background: #40414f; border-radius: 8px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
        }

        #userInput {
            width: 100%; background: transparent; border: none;
            color: white; padding: 14px 45px 14px 16px;
            font-size: 16px; outline: none; resize: none;
            font-family: inherit; min-height: 52px;
            max-height: 200px;
        }

        .send-btn {
            position: absolute; right: 12px; bottom: 12px;
            background: transparent; border: none; cursor: pointer; color: #acacbe;
        }

        /* Loading state */
        .loading-dots { color: #9ca3af; font-size: 12px; }
    </style>
</head>
