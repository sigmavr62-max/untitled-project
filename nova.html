<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: #343541; /* Classic GPT Dark Gray */
            font-family: 'Sentry', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #ececf1;
        }

        #app { display: flex; height: 100vh; width: 100%; }

        /* Sidebar - Clean & Simple */
        #sidebar {
            width: 260px; background-color: #202123;
            padding: 10px; display: flex; flex-direction: column;
            border-right: 1px solid rgba(255,255,255,0.1);
        }

        .new-chat {
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 5px; padding: 12px;
            font-size: 14px; cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 20px;
        }
        .new-chat:hover { background: rgba(255,255,255,0.1); }

        /* Main Chat Area */
        #main-container {
            flex: 1; display: flex; flex-direction: column;
            position: relative; overflow: hidden;
        }

        #chat-window {
            flex: 1; overflow-y: auto; display: flex; flex-direction: column;
        }

        /* Message Rows */
        .message-row {
            padding: 24px 0; width: 100%;
            display: flex; justify-content: center;
        }
        .user-row { background-color: #343541; }
        .nova-row { background-color: #444654; } /* Contrast row like old GPT */

        .message-content {
            max-width: 650px; width: 90%;
            display: flex; gap: 20px; font-size: 16px; line-height: 1.5;
        }

        .avatar {
            width: 30px; height: 30px; border-radius: 2px;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; flex-shrink: 0;
        }
        .user-avatar { background: #5436da; }
        .nova-avatar { background: #10a37f; }

        /* Input Area */
        .input-container {
            padding: 20px 0 40px 0;
            background: linear-gradient(180deg, rgba(52,53,65,0), #343541 50%);
            display: flex; justify-content: center;
        }

        .input-box {
            max-width: 650px; width: 90%; position: relative;
            background: #40414f; border-radius: 5px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }

        #userText {
            width: 100%; background: transparent; border: none;
            color: white; padding: 14px 45px 14px 15px;
            font-size: 16px; outline: none; box-sizing: border-box;
            resize: none; font-family: inherit;
        }

        .send-btn {
            position: absolute; right: 10px; bottom: 10px;
            background: transparent; border: none; cursor: pointer;
            color: #acacbe;
        }
    </style>
</head>
<body>

<div id="app">
    <div id="sidebar">
        <div class="new-chat">+ New Chat</div>
    </div>

    <div id="main-container">
        <div id="chat-window">
            <!-- Messages appear here -->
            <div class="message-row nova-row">
                <div class="message-content">
                    <div class="avatar nova-avatar">N</div>
                    <div>Hello. I am Nova. How can I help you today?</div>
                </div>
            </div>
        </div>

        <div class="input-container">
            <div class="input-box">
                <textarea id="userText" rows="1" placeholder="Send a message..."></textarea>
                <button class="send-btn" id="sendBtn">
                    <svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" height="1em" width="1em"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    const chatWindow = document.getElementById('chat-window');
    const input = document.getElementById('userText');
    const btn = document.getElementById('sendBtn');

    function addMessage(text, isUser) {
        const row = document.createElement('div');
        row.className = `message-row ${isUser ? 'user-row' : 'nova-row'}`;
        
        row.innerHTML = `
            <div class="message-content">
                <div class="avatar ${isUser ? 'user-avatar' : 'nova-avatar'}">${isUser ? 'U' : 'N'}</div>
                <div>${text}</div>
            </div>
        `;
        
        chatWindow.appendChild(row);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function handleSend() {
        const text = input.value.trim();
        if (text) {
            addMessage(text, true);
            input.value = '';
            // Temporary placeholder response
            setTimeout(() => {
                addMessage("I am ready for your instructions. What is our first step?", false);
            }, 600);
        }
    }

    btn.addEventListener('click', handleSend);
    input.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            handleSend();
        }
    });
</script>

</body>
</html>
