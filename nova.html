<script>
    async function neuralScan(file) {
        chat.innerHTML += `<div class="msg user"><i>[Deep Analysis: ${file.name}]</i></div>`;
        const scanId = `scan-${Date.now()}`;
        chat.innerHTML += `<div class="msg nova" id="${scanId}">Initializing Deep Scan... cleaning pixels...</div>`;
        chat.scrollTop = chat.scrollHeight;

        const log = document.getElementById(scanId);
        
        // 1. MEMORY CHECK
        const fileSignature = file.name + "_" + file.size;
        let memoryStatus = imageMemory.includes(fileSignature) ? 
            "Recognized: This is your image." : "New Signature: Not found in memory.";
        
        if (!imageMemory.includes(fileSignature)) {
            imageMemory.push(fileSignature);
            localStorage.setItem('nova_image_memory', JSON.stringify(imageMemory));
        }

        const reader = new FileReader();
        reader.onload = (event) => {
            const img = new Image();
            img.src = event.target.result;
            img.onload = async () => {
                // 2. IMAGE PRE-PROCESSING (For better text reading)
                canvas.width = img.width; 
                canvas.height = img.height;
                ctx.filter = 'grayscale(100%) contrast(150%)'; // Make text stand out from the money
                ctx.drawImage(img, 0, 0);
                
                // 3. COLOR SAMPLING (Using a small 50x50 sample for speed)
                const sampleCanvas = document.createElement('canvas');
                const sCtx = sampleCanvas.getContext('2d');
                sampleCanvas.width = 50; sampleCanvas.height = 50;
                sCtx.drawImage(img, 0, 0, 50, 50);
                const p = sCtx.getImageData(0,0,50,50).data;
                let r=0, g=0, b=0;
                for(let i=0; i<p.length; i+=4){ r+=p[i]; g+=p[i+1]; b+=p[i+2]; }
                const colorDesc = getColorDescription(r/2500, g/2500, b/2500);

                log.innerHTML = "Reading text layers... cross-referencing with storage...";

                // 4. IMPROVED OCR
                try {
                    const result = await Tesseract.recognize(canvas, 'eng');
                    let cleanText = result.data.text.replace(/[^a-zA-Z0-9\s]/g, '').trim();
                    
                    // Logic to see if it's "Your" image based on your studio name
                    let ownership = "This is a random image.";
                    if (cleanText.toLowerCase().includes("dash01") || cleanText.toLowerCase().includes("polar")) {
                        ownership = "<b>Confirmed: This is a Dash01 Studios / Polar asset.</b>";
                    }

                    log.innerHTML = `
                        <b>Scan Results:</b><br>
                        - Memory: ${memoryStatus}<br>
                        - Colors: ${colorDesc}<br>
                        - Owner: ${ownership}<br><br>
                        <b>Extracted Text:</b><br>
                        "${cleanText || "No clear text found"}"
                    `;
                } catch (e) {
                    log.innerHTML = "Neural glitch during OCR. I'm too dumb to read this one.";
                }
                chat.scrollTop = chat.scrollHeight;
                bumpVersion();
            };
        };
        reader.readAsDataURL(file);
    }
</script>
