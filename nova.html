<!DOCTYPE html>
<html>
<head>
    <link href="https://fonts.googleapis.com/css2?family=Londrina+Solid:wght@300;400;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/12.4.0/math.all.js"></script>
    <style>
        :root { --accent: #ff453a; --bg: #000; }
        body { background: var(--bg); color: white; font-family: 'Londrina Solid', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        .header { padding: 20px 30px; border-bottom: 1px solid #111; display: flex; justify-content: space-between; align-items: center; background: #000; }
        #status { font-size: 0.8rem; letter-spacing: 3px; color: #444; }
        
        #chat { flex: 1; overflow-y: auto; padding: 30px; display: flex; flex-direction: column; gap: 20px; }
        .msg { padding: 20px 25px; border-radius: 30px; max-width: 75%; font-size: 1.5rem; line-height: 1.2; animation: floatUp 0.4s ease; }
        .nova { background: var(--accent); align-self: flex-start; border-bottom-left-radius: 2px; box-shadow: 0 10px 30px rgba(255, 69, 58, 0.1); }
        .user { background: #111; align-self: flex-end; border-bottom-right-radius: 2px; border: 1px solid #333; }

        .input-area { padding: 30px; background: #000; border-top: 1px solid #111; }
        input { width: 100%; padding: 22px; border-radius: 50px; border: 1px solid #222; background: #0a0a0a; color: white; font-size: 1.4rem; outline: none; transition: 0.3s; box-sizing: border-box; }
        input:focus { border-color: var(--accent); }
        
        @keyframes floatUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="header">
        <span style="font-size: 2.2rem;">NOVA <small style="color:#222">DUMB_MODEL_v5</small></span>
        <div id="status">NEURAL_IDLE</div>
    </div>

    <div id="chat">
        <div class="msg nova">I am a very dumb model, but I can try to help. What's up?</div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Ask a question or a math problem..." autocomplete="off">
    </div>

    <script>
        const chat = document.getElementById('chat');
        const input = document.getElementById('userInput');
        const status = document.getElementById('status');

        input.addEventListener('keypress', async (e) => {
            if (e.key === 'Enter' && input.value.trim() !== "") {
                const query = input.value.trim();
                input.value = "";
                await solve(query);
            }
        });

        async function solve(query) {
            chat.innerHTML += `<div class="msg user">${query}</div>`;
            chat.scrollTop = chat.scrollHeight;

            status.innerText = "PROCESSING...";
            status.style.color = "#ff453a";

            // 1. Give it that 3-5 second "Thinking" delay
            setTimeout(() => {
                let response = "";

                // IDENTITY GATE
                const identityTriggers = ["who are you", "what model", "what ai"];
                const isIdentity = identityTriggers.some(t => query.toLowerCase().includes(t));

                if (isIdentity) {
                    response = "My name is nova, i am a very dumb and unknown model.";
                } else {
                    // MATH GATE (The Calculator "API")
                    try {
                        // We use math.evaluate to see if the string contains a solvable equation
                        const result = math.evaluate(query.replace(/[?]/g, ''));
                        response = `I think the answer is ${result}... but I'm just a dumb model, so double check it.`;
                    } catch (err) {
                        // If it's not math, try general logic
                        if (query.toLowerCase().includes("hi")) {
                            response = "Hi. My circuits are currently stable.";
                        } else {
                            response = "Sorry, i dont know this yet!";
                        }
                    }
                }

                status.innerText = "NEURAL_IDLE";
                status.style.color = "#444";
                chat.innerHTML += `<div class="msg nova">${response}</div>`;
                chat.scrollTop = chat.scrollHeight;
            }, 3000); 
        }
    </script>
</body>
</html>
