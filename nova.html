<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova</title>
    <style>
        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: #343541;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #ececf1;
            overflow: hidden;
        }

        #app { display: flex; flex-direction: column; height: 100vh; }

        /* Loader Bar for .bin progress */
        #loader-bar {
            position: fixed; top: 0; left: 0; height: 3px;
            width: 0%; background: #10a37f; transition: width 0.3s; z-index: 999;
        }

        #chat-window {
            flex: 1; overflow-y: auto; display: flex; flex-direction: column;
            padding-bottom: 120px;
        }

        .message-row {
            width: 100%; padding: 24px 40px;
            display: flex; justify-content: flex-start;
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }

        .user-row { background-color: #343541; }
        .nova-row { background-color: #444654; }

        .content-wrapper { display: flex; align-items: flex-start; gap: 20px; width: 100%; }

        .avatar {
            width: 36px; height: 36px; border-radius: 2px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 600; font-size: 14px; color: white; flex-shrink: 0;
        }
        .user-avatar { background: #5436da; }
        .nova-avatar { background: #10a37f; }

        .text-box { font-size: 16px; line-height: 1.5; white-space: pre-wrap; word-wrap: break-word; }

        .input-area {
            position: fixed; bottom: 0; left: 0; width: 100%;
            padding: 20px 0 40px 0;
            background: linear-gradient(180deg, rgba(52,53,65,0), #343541 70%);
            display: flex; justify-content: center;
        }

        .input-container {
            max-width: 90%; width: 800px; position: relative;
            background: #40414f; border-radius: 8px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
        }

        #userInput {
            width: 100%; background: transparent; border: none;
            color: white; padding: 14px 45px 14px 16px;
            font-size: 16px; outline: none; resize: none;
            font-family: inherit; min-height: 52px;
            max-height: 200px;
        }

        .send-btn {
            position: absolute; right: 12px; bottom: 12px;
            background: transparent; border: none; cursor: pointer; color: #acacbe;
        }
    </style>
</head>
<body>

<div id="loader-bar"></div>

<div id="app">
    <div id="chat-window">
        <div class="message-row nova-row">
            <div class="content-wrapper">
                <div class="avatar nova-avatar">N</div>
                <div class="text-box" id="status-text">Waking up Nova... Syncing with GitHub.</div>
            </div>
        </div>
    </div>

    <div class="input-area">
        <div class="input-container">
            <textarea id="userInput" placeholder="Send a message..." rows="1"></textarea>
            <button class="send-btn" id="sendBtn">
                <svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" height="18" width="18"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>
    </div>
</div>

<script>
    const BIN_URL = "https://raw.githubusercontent.com/sigmavr62-max/Nova-Project/refs/heads/main/nova_core.bin";
    const chat = document.getElementById('chat-window');
    const input = document.getElementById('userInput');
    const btn = document.getElementById('sendBtn');
    const bar = document.getElementById('loader-bar');
    
    let isReady = false;

    // Load weights in the background
    async function loadNova() {
        try {
            const response = await fetch(BIN_URL);
            if (!response.ok) throw new Error("GitHub link is broken.");

            const reader = response.body.getReader();
            const contentLength = +response.headers.get('Content-Length');
            
            let receivedLength = 0;
            while(true) {
                const {done, value} = await reader.read();
                if (done) break;
                receivedLength += value.length;
                if (contentLength) {
                    bar.style.width = (receivedLength / contentLength * 100) + "%";
                }
            }

            isReady = true;
            bar.style.display = "none";
            document.getElementById('status-text').innerText = "Yo. Weights loaded. I'm ready.";
        } catch (e) {
            document.getElementById('status-text').innerText = "Error: Check your Raw GitHub link or CORS policy.";
            console.error(e);
        }
    }

    function createRow(text, isUser) {
        const row = document.createElement('div');
        row.className = `message-row ${isUser ? 'user-row' : 'nova-row'}`;
        row.innerHTML = `<div class="content-wrapper"><div class="avatar ${isUser ? 'user-avatar' : 'nova-avatar'}">${isUser ? 'U' : 'N'}</div><div class="text-box">${text}</div></div>`;
        chat.appendChild(row);
        chat.scrollTop = chat.scrollHeight;
    }

    async function handleReply(msg) {
        const lower = msg.toLowerCase().trim();
        let response = "";

        // Randomized Human Response Lists
        const fillers = [
            "For sure. What's the next part of the plan?",
            "I'm following. What else you got?",
            "Copy that. Should we tweak the code or move on?",
            "Alright, I'm locked in. What's the move?",
            "Makes sense. You want me to look into anything else?",
            "Standard. Let's keep it pushing."
        ];

        const farewells = [
            "Alright, catch you later.",
            "Peace. I'll be here if you need more work done.",
            "Later. Don't forget to save the progress.",
            "Safe travels. See ya."
        ];

        // Specific Keyword Logic
        if (lower.includes("yo") || lower.includes("hi") || lower.includes("hello")) {
            response = "Yo! What's the move?";
        } 
        else if (lower.includes("who are you")) {
            response = "I'm Nova. Running on that custom .bin logic.";
        } 
        else if (lower.includes("bye") || lower.includes("go now") || lower.includes("later")) {
            response = farewells[Math.floor(Math.random() * farewells.length)];
        }
        else if (lower.includes("dash01")) {
            response = "Dash01 Studios is locked in. What are we drafting?";
        }
        else {
            response = fillers[Math.floor(Math.random() * fillers.length)];
        }

        // Slight delay to feel like she's typing
        setTimeout(() => {
            createRow(response, false);
        }, 600);
    }

    function handleSend() {
        const val = input.value.trim();
        if (!val || !isReady) return;
        
        createRow(val, true);
        input.value = "";
        handleReply(val);
    }

    btn.onclick = handleSend;
    input.onkeydown = (e) => { if(e.key === "Enter" && !e.shiftKey) { e.preventDefault(); handleSend(); }};

    loadNova();
</script>
</body>
</html>
