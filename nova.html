<!DOCTYPE html>
<html>
<head>
    <link href="https://fonts.googleapis.com/css2?family=Londrina+Solid:wght@300;400;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <style>
        :root { --accent: #ff453a; --bg: #000; }
        body { background: var(--bg); color: white; font-family: 'Londrina Solid', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; position: relative; overflow: hidden; }
        #auth-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
        .auth-card { background: #0a0a0a; padding: 40px; border-radius: 30px; border: 1px solid #222; width: 300px; text-align: center; }
        .auth-card input { width: 100%; margin-bottom: 15px; padding: 12px; border-radius: 10px; border: 1px solid #333; background: #000; color: white; font-family: 'Londrina Solid'; }
        .auth-btn { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; width: 100%; font-size: 1.2rem; font-family: 'Londrina Solid'; }
        #version-tag { position: fixed; bottom: 15px; right: 25px; color: #ffffff; opacity: 0.6; font-size: 1.1rem; pointer-events: none; z-index: 100; text-transform: uppercase; }
        #logout-btn { position: fixed; top: 15px; right: 25px; background: transparent; color: #444; border: 1px solid #222; padding: 5px 15px; border-radius: 20px; cursor: pointer; z-index: 101; }
        #chat { flex: 1; overflow-y: auto; padding: 30px; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 18px 25px; border-radius: 25px; max-width: 75%; font-size: 1.5rem; animation: pop 0.2s ease; }
        .nova { background: var(--accent); align-self: flex-start; border-bottom-left-radius: 2px; }
        .user { background: #111; align-self: flex-end; border-bottom-right-radius: 2px; border: 1px solid #333; }
        .input-area { padding: 25px; background: #000; border-top: 1px solid #111; display: flex; gap: 15px; align-items: center; }
        #userInput { flex: 1; padding: 18px 25px; border-radius: 50px; border: 1px solid #222; background: #080808; color: white; font-size: 1.3rem; outline: none; }
        canvas { display: none; }
        @keyframes pop { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <h1 style="font-size: 3rem; margin-bottom: 0;">NOVA CORE</h1>
        <p style="color: #444; margin-top: 0;">AUTHENTICATION REQUIRED</p>
        <div class="auth-card">
            <input type="text" id="regUser" placeholder="Username">
            <input type="password" id="regPass" placeholder="Password">
            <button class="auth-btn" onclick="handleAuth()">ENTER NEURAL LINK</button>
            <p id="auth-msg" style="font-size: 0.8rem; color: var(--accent); margin-top: 10px;"></p>
        </div>
    </div>

    <button id="logout-btn" onclick="logout()" style="display:none;">LOGOUT</button>
    <div id="version-tag">NOVA_CORE v1.0.0</div>

    <div id="chat">
        <div class="msg nova">Identity Scanner v7 online. Upload any image, and I will attempt to recognize the logo based on my neural knowledge base.</div>
    </div>

    <div class="input-area">
        <input type="file" id="imgInput" hidden accept="image/*">
        <button style="background:#222; border:none; color:white; border-radius:50%; width:50px; cursor:pointer;" onclick="document.getElementById('imgInput').click()">📷</button>
        <input type="text" id="userInput" placeholder="Talk to Nova..." autocomplete="off">
    </div>

    <canvas id="calcCanvas"></canvas>

    <script>
        const authOverlay = document.getElementById('auth-overlay');
        const logoutBtn = document.getElementById('logout-btn');
        const verTag = document.getElementById('version-tag');
        const chat = document.getElementById('chat');
        const input = document.getElementById('userInput');
        const canvas = document.getElementById('calcCanvas');
        const ctx = canvas.getContext('2d');
        
        let novaVersion = parseInt(localStorage.getItem('novaVersion')) || 100;

        // --- Simulated "Knowledge Base" of Logos ---
        const logoVectors = {
            chatgpt: [22, 22, 22], // Example pixel distribution vector
            google: [210, 210, 210],
            apple: [0, 0, 0]
        };

        // --- AUTH LOGIC ---
        function checkLogin() {
            const session = localStorage.getItem('nova_session');
            if (session) {
                authOverlay.style.display = 'none';
                logoutBtn.style.display = 'block';
                verTag.innerText = `NOVA_CORE v1.0.${novaVersion}`;
            }
        }

        function handleAuth() {
            const u = document.getElementById('regUser').value;
            const p = document.getElementById('regPass').value;
            if (u.length > 2 && p.length > 2) {
                localStorage.setItem('nova_session', u);
                localStorage.setItem('nova_user_pass', p); // Simple storage
                location.reload(); 
            } else {
                document.getElementById('auth-msg').innerText = "MINIMUM 3 CHARACTERS";
            }
        }

        function logout() {
            localStorage.removeItem('nova_session');
            location.reload();
        }

        // --- CHAT & VISION LOGIC ---
        function bumpVersion() {
            novaVersion++;
            localStorage.setItem('novaVersion', novaVersion);
            verTag.innerText = `NOVA_CORE v1.0.${novaVersion}`;
        }

        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && input.value.trim() !== "") {
                const msg = input.value.trim();
                input.value = "";
                bumpVersion();
                chat.innerHTML += `<div class="msg user">${msg}</div>`;
                process(msg);
            }
        });

        document.getElementById('imgInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                bumpVersion();
                neuralScan(file);
            }
        });

        function neuralScan(file) {
            chat.innerHTML += `<div class="msg user"><i>[Identity Scan: ${file.name}]</i></div>`;
            
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    // Neural Scanning Phase 1: Shape/Geometry Vectorization
                    canvas.width = 50; canvas.height = 50; // Resize for efficient tensor processing
                    ctx.drawImage(img, 0, 0, 50, 50);
                    
                    const imgData = ctx.getImageData(0, 0, 50, 50).data;
                    const rValues = [];
                    for (let i = 0; i < imgData.length; i += 4) {
                        rValues.push(imgData[i]); // Use Red channel to create a basic shape vector
                    }
                    
                    const inputTensor = tf.tensor1d(rValues);
                    const shapeVector = inputTensor.dataSync();

                    // Phase 2: Knowledge Base Lookup (Simulated Online Search)
                    let foundLogo = "Unknown Identity";
                    let highestScore = 0;
                    
                    for (let logo in logoVectors) {
                        // Simulated vector similarity score
                        const ref = logoVectors[logo][0];
                        let score = shapeVector.filter(v => v > ref).length;
                        
                        if (score > highestScore) {
                            highestScore = score;
                            foundLogo = logo;
                        }
                    }

                    inputTensor.dispose(); // Clean up GPU memory

                    chat.innerHTML += `<div class="msg nova">Thinking... comparing shape vector... cross-referencing against internal database...</div>`;
                    
                    setTimeout(() => {
                        let resultResponse = "Sorry, i dont know this yet!";
                        
                        // CONFIDENCE THRESHOLD GATE: Only identify if the score is high enough.
                        if (highestScore > 100) {
                            resultResponse = `Scanning complete. Analysis indicates this is the <b>${foundLogo}</b> logo. The geometry matches with high confidence. Result: cool.`;
                        } else {
                            resultResponse = `Scanning complete. Analysis indicates this is an unknown logo. Based on the colors, it looks cool, though.`;
                        }

                        chat.innerHTML += `<div class="msg nova">${resultResponse}</div>`;
                        chat.scrollTop = chat.scrollHeight;
                    }, 1200); 
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        }

        function process(query) {
            let res = "Sorry, i dont know this yet!";
            const q = query.toLowerCase();
            if (q === "nova") res = "Hello!";
            else if (q.includes("who")) res = "My name is nova, i am a very dumb and unknown model.";
            
            setTimeout(() => {
                chat.innerHTML += `<div class="msg nova">${res}</div>`;
                chat.scrollTop = chat.scrollHeight;
            }, 400);
        }

        // Initialize
        checkLogin();
    </script>
</body>
</html>
