<!DOCTYPE html>
<html>
<head>
    <link href="https://fonts.googleapis.com/css2?family=Londrina+Solid:wght@300;400;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #ff453a; --bg: #000; }
        body { background: var(--bg); color: white; font-family: 'Londrina Solid', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { padding: 20px 30px; border-bottom: 1px solid #111; display: flex; justify-content: space-between; align-items: center; }
        #status { font-size: 0.7rem; color: #444; letter-spacing: 2px; }
        #chat { flex: 1; overflow-y: auto; padding: 30px; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 18px 25px; border-radius: 25px; max-width: 80%; font-size: 1.4rem; line-height: 1.2; animation: pop 0.3s ease; }
        .nova { background: var(--accent); align-self: flex-start; border-bottom-left-radius: 2px; }
        .user { background: #111; align-self: flex-end; border-bottom-right-radius: 2px; border: 1px solid #333; }
        .input-area { padding: 25px; background: #000; border-top: 1px solid #111; }
        input { width: 100%; padding: 20px; border-radius: 50px; border: 1px solid #222; background: #080808; color: white; font-size: 1.3rem; outline: none; box-sizing: border-box; }
        @keyframes pop { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>
    <div class="header">
        <span>NOVA <small style="color:#222">DICTIONARY_ENGINE</small></span>
        <div id="status">SCANNING_IDLE</div>
    </div>
    <div id="chat"><div class="msg nova">Meaning scanner active. I'm ready.</div></div>
    <div class="input-area"><input type="text" id="userInput" placeholder="Ask Nova anything..." autocomplete="off"></div>

    <script>
        const chat = document.getElementById('chat');
        const input = document.getElementById('userInput');
        const status = document.getElementById('status');

        // NOVA'S INTERNAL MEANING DICTIONARY
        const dictionary = {
            identity: {
                matches: [/who/i, /nova/i, /name/i, /you/i, /what/i],
                full: "My name is nova, i am a very dumb and unknown model.",
                single: "Nova"
            },
            math: {
                matches: [/[0-9]/, /\+/, /\-/, /\*/, /\//, /calculate/i],
                single: "Computing"
            },
            greeting: {
                matches: [/hi/i, /hello/i, /hey/i, /sup/i],
                full: "Hi. I am currently running on your local hardware.",
                single: "Hello"
            }
        };

        input.addEventListener('keypress', async (e) => {
            if (e.key === 'Enter' && input.value.trim() !== "") {
                const q = input.value.trim();
                input.value = "";
                processQuery(q);
            }
        });

        function processQuery(query) {
            chat.innerHTML += `<div class="msg user">${query}</div>`;
            chat.scrollTop = chat.scrollHeight;
            status.innerText = "SCANNING DICTIONARY...";

            setTimeout(() => {
                let finalResponse = "Sorry, i dont know this yet!";
                let foundMatch = false;

                // Scan the dictionary for meanings
                for (let category in dictionary) {
                    const data = dictionary[category];
                    const matchCount = data.matches.filter(regex => regex.test(query)).length;

                    // If we find a strong match (2+ related words) or a specific trigger
                    if (matchCount >= 1) {
                        // Logic: If it's a short query, give the "One Word" answer. 
                        // If it's a full sentence, give the "Full" answer.
                        const isShort = query.split(" ").length <= 1;
                        finalResponse = isShort ? data.single : (data.full || data.single);
                        foundMatch = true;
                        break;
                    }
                }

                status.innerText = "SCANNING_IDLE";
                chat.innerHTML += `<div class="msg nova">${finalResponse}</div>`;
                chat.scrollTop = chat.scrollHeight;
            }, 800);
        }
    </script>
</body>
</html>
