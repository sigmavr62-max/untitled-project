<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polar Project</title> 
    
    <style>
        @font-face {
            font-family: 'BurbankCustom';
            /* Pointing to your new .otf file */
            src: url('BurbankBigCondensed-Black.otf') format('opentype');
            font-weight: black;
            font-style: normal;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        body {
            /* Applying the new Burbank font here */
            font-family: 'BurbankCustom', sans-serif;
            background-color: #000;
            color: #fff;
            padding: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 80vh;
            overflow: hidden;
        }

        .container {
            animation: fadeInUp 1s ease-out forwards;
        }

        .disclaimer {
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #ff453a;
            margin-bottom: 5px;
            /* Using standard sans-serif for the small text keeps it readable */
            font-family: sans-serif; 
            font-weight: bold;
        }

        h1 {
            font-size: 8rem; /* Burbank looks better when it's HUGE */
            font-weight: 900;
            margin: 0;
            text-transform: uppercase;
            line-height: 0.9;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="disclaimer">Welcome to</div>
        <h1 id="site-name">Polar Project</h1>
    </div>

</body>
</html>
