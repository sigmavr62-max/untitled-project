<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polar Project</title> 
    
    <style>
        /* 1. Correct Font Face Declaration */
        @font-face {
            font-family: 'BurbankCustom';
            /* Ensure this file is in the same folder as this HTML file */
            src: url('BurbankBigCondensed-Black.otf') format('opentype');
            font-weight: 900; 
            font-style: normal;
            font-display: swap; /* Helps text appear faster while font loads */
        }

        /* 2. Entrance Animation */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 3. Global Styles */
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            font-family: 'BurbankCustom', sans-serif;
            
            /* Vertical and Horizontal Centering */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden; /* Prevents side-scrolling on mobile */
        }

        .container {
            text-align: center;
            padding: 20px;
            animation: fadeInUp 1.2s ease-out forwards;
        }

        /* 4. Small Text Styling */
        .disclaimer {
            font-family: sans-serif; /* Keep readable */
            font-size: 1.1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #ff453a;
            margin-bottom: 10px;
        }

        /* 5. Responsive Header Styling */
        h1 {
            /* clamp(minimum, preferred, maximum) */
            font-size: clamp(3.5rem, 15vw, 9rem); 
            font-weight: 900;
            margin: 0;
            text-transform: uppercase;
            line-height: 0.85;
            letter-spacing: -2px;
            /* Optional: subtle text shadow for depth */
            text-shadow: 0px 10px 30px rgba(255, 255, 255, 0.1);
        }

        /* Optional: Mobile adjustment for the disclaimer */
        @media (max-width: 600px) {
            .disclaimer {
                font-size: 0.9rem;
                letter-spacing: 1.5px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="disclaimer">Welcome to</div>
        <h1 id="site-name">Polar<br>Project</h1>
    </div>

</body>
</html>
