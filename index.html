<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- CHANGE THE NAME BELOW TO CHANGE THE NAME ON THE PAGE -->
    <title>project 1</title> 
    
    <style>
        @font-face {
            font-family: 'SF-Pro-Custom';
            src: url('SF-Pro.tff') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        body {
            font-family: 'SF-Pro-Custom', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #000;
            color: #fff;
            padding: 50px;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 80vh;
        }

        .disclaimer {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #ff453a;
            margin-bottom: 10px;
        }

        #site-name {
            font-size: 5rem;
            font-weight: 800;
            margin: 0;
            letter-spacing: -2px; /* Gives it that Apple/SF Pro look */
        }
    </style>
</head>
<body>

    <div class="disclaimer">
        Welcome to
    </div>
    
    <!-- This ID "site-name" is where the magic happens -->
    <h1 id="site-name">Untitled [TEST]</h1>

    <script>
        // This tiny bit of code takes your <title> and puts it in the <h1>
        const titleText = document.title;
        document.getElementById('site-name').innerText = titleText;
    </script>

</body>
</html>
